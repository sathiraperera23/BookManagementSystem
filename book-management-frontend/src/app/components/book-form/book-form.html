<div class="w-full max-w-3xl mx-auto p-4">
  <h1 class="text-2xl font-bold text-gray-800 mb-4">{{ isEdit ? 'Edit Book' : 'Add Book' }}</h1>
  
  <form (ngSubmit)="save()" #bookForm="ngForm" class="space-y-4">
    <div>
      <label class="block font-medium">Title</label>
      <input type="text" [(ngModel)]="book.title" name="title" required
        class="w-full border px-3 py-2 rounded" />
    </div>
    <div>
      <label class="block font-medium">Author</label>
      <input type="text" [(ngModel)]="book.author" name="author" required
        class="w-full border px-3 py-2 rounded" />
    </div>
    <div>
      <label class="block font-medium">ISBN</label>
      <input type="text" [(ngModel)]="book.isbn" name="isbn"
        class="w-full border px-3 py-2 rounded" />
    </div>
    <div>
      <label class="block font-medium">Publication Date</label>
      <input type="date" [(ngModel)]="book.publicationDate" name="publicationDate"
        class="w-full border px-3 py-2 rounded" />
    </div>
    <button type="submit"
      class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      {{ isEdit ? 'Update' : 'Add' }}
    </button>
  </form>
</div>
