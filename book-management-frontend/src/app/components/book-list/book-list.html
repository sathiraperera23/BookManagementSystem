<div class="w-full max-w-6xl mx-auto p-4">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Book Management</h1>
    <button (click)="addBook()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      + Add Book
    </button>
  </div>

  <div *ngIf="loading" class="text-center text-gray-500 py-10">
    Loading books...
  </div>

  <div *ngIf="!loading && books.length === 0" class="text-center text-gray-500 py-10">
    No books found. Add one!
  </div>

  <div *ngIf="!loading && books.length > 0" class="overflow-x-auto">
    <table class="w-full border-collapse bg-white shadow rounded">
      <thead class="bg-gray-100 text-left">
        <tr>
          <th class="p-3 border-b">Title</th>
          <th class="p-3 border-b">Author</th>
          <th class="p-3 border-b">ISBN</th>
          <th class="p-3 border-b">Published</th>
          <th class="p-3 border-b">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let book of books; trackBy: trackById" class="hover:bg-gray-50">
          <td class="p-3 border-b">{{ book.title }}</td>
          <td class="p-3 border-b">{{ book.author }}</td>
          <td class="p-3 border-b">{{ book.isbn }}</td>
          <td class="p-3 border-b">{{ book.publicationDate | date:'mediumDate' }}</td>
          <td class="p-3 border-b space-x-2 whitespace-nowrap">
            <button (click)="editBook(book.id)" class="bg-yellow-400 text-white px-3 py-1 rounded hover:bg-yellow-500">
              Edit
            </button>
            <button (click)="deleteBook(book.id)" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
